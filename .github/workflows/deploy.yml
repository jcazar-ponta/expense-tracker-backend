name: Deploy

on:
  push:
    branches:
      - develop
      - stage
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.determine-env.outputs.environment }}
      image_tag: ${{ steps.determine-env.outputs.image_tag }}

    steps:
      - name: Determine environment from branch
        id: determine-env
        run: |
          if [ -z "${{ vars.REGION }}" ]; then
            echo "Error: GitHub variable REGION is not set."
            exit 1
          fi
          if [ -z "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "Error: GitHub variable GCP_PROJECT_ID is not set."
            exit 1
          fi
          BRANCH="${{ github.ref_name }}"
          case "$BRANCH" in
            develop)
              ENV="develop"
              ;;
            stage)
              ENV="stage"
              ;;
            main)
              ENV="prod"
              ;;
            *)
              echo "Error: Branch $BRANCH does not map to a known environment"
              exit 1
              ;;
          esac
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "image_tag=${{ vars.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ github.ref_name == 'main' && 'studio-gcr-prod' || github.ref_name == 'stage' && 'studio-gcr-stage' || 'studio-gcr-dev' }}/expense-tracker:$ENV-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "Deploying to environment: $ENV"

  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          REGION="${{ vars.REGION || 'us-central1' }}"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ needs.setup.outputs.image_tag }} -f Dockerfile .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ needs.setup.outputs.image_tag }}

      - name: Tag image as latest for environment
        run: |
          ENV_TAG="${{ vars.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ github.ref_name == 'main' && 'studio-gcr-prod' || github.ref_name == 'stage' && 'studio-gcr-stage' || 'studio-gcr-dev' }}/expense-tracker:${{ needs.setup.outputs.environment }}-latest"
          docker tag ${{ needs.setup.outputs.image_tag }} $ENV_TAG
          docker push $ENV_TAG

  deploy-service:
    name: Deploy Cloud Run Service
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Prepare environment variables
        id: prep-env
        env:
          INPUT_ENV_VARS_JSON: >-
            {
              "DJANGO_SETTINGS_MODULE": "${{ github.ref_name == 'main' && 'config.settings.prod' || github.ref_name == 'stage' && 'config.settings.stage' || 'config.settings.develop' }}",
              "ALLOWED_HOSTS": "${{ github.ref_name == 'main' && vars.DJANGO_ALLOWED_HOSTS_PROD || github.ref_name == 'stage' && vars.DJANGO_ALLOWED_HOSTS_STAGE || vars.DJANGO_ALLOWED_HOSTS_DEVELOP }}",
              "DB_ENGINE_TYPE": "pg",
              "DB_ENGINE": "django.db.backends.postgresql_psycopg2",
              "DB_NAME": "test_db",
              "DB_USER": "postgres",
              "DB_PASSWORD": "${{ secrets.DB_PASSWORD }}",
              "DB_HOST": "/cloudsql/involuted-bird-416608:us-central1:platform-develop",
              "DB_PORT": "",
              "CORS_ALLOW_ALL_ORIGINS": "False",
              "CORS_ALLOWED_ORIGINS": "${{ github.ref_name == 'main' && vars.CORS_ALLOWED_ORIGINS_PROD || github.ref_name == 'stage' && vars.CORS_ALLOWED_ORIGINS_STAGE || vars.CORS_ALLOWED_ORIGINS_DEVELOP }}",
              "CORS_ALLOW_CREDENTIALS": "False",
              "JWT_ALGORITHM": "${{ vars.JWT_ALGORITHM || 'HS256' }}",
              "JWT_ACCESS_TOKEN_LIFETIME_MINUTES": "${{ vars.JWT_ACCESS_TOKEN_LIFETIME_MINUTES || '30' }}",
              "JWT_REFRESH_TOKEN_LIFETIME_DAYS": "${{ vars.JWT_REFRESH_TOKEN_LIFETIME_DAYS || '14' }}",
              "JWT_ROTATE_REFRESH_TOKENS": "${{ vars.JWT_ROTATE_REFRESH_TOKENS || 'True' }}",
              "JWT_BLACKLIST_AFTER_ROTATION": "${{ vars.JWT_BLACKLIST_AFTER_ROTATION || 'True' }}",
              "JWT_SIGNING_KEY": "${{ secrets.JWT_SIGNING_KEY }}",
              "SECRET_KEY": "${{ secrets.SECRET_KEY }}"
            }
        run: |
          set -e
          BASE_JSON='{"ENVIRONMENT":"${{ needs.setup.outputs.environment }}","CLOUDSQL_INSTANCE":"involuted-bird-416608:us-central1:platform-develop"}'
          MERGED_JSON=$(jq -s '.[0] * .[1]' <(echo "$BASE_JSON") <(echo "$INPUT_ENV_VARS_JSON"))
          ENV_FILE="$(mktemp)"
          echo "$MERGED_JSON" > "$ENV_FILE"
          echo "env_vars_file=$ENV_FILE" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          SERVICE_NAME="svc-expense-tracker-${{ needs.setup.outputs.environment }}"
          gcloud run deploy $SERVICE_NAME \
            --image ${{ needs.setup.outputs.image_tag }} \
            --platform managed \
            --region ${{ vars.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --service-account ${{ vars.RUNTIME_SA }} \
            --env-vars-file "${{ steps.prep-env.outputs.env_vars_file }}" \
            --set-cloudsql-instances="involuted-bird-416608:us-central1:platform-develop" \
            --min-instances 0 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --allow-unauthenticated \
            --quiet

  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [setup, build-and-push, deploy-service]

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Prepare environment variables for migration job
        id: prep-migrate-env
        env:
          INPUT_ENV_VARS_JSON: >-
            {
              "DJANGO_SETTINGS_MODULE": "${{ github.ref_name == 'main' && 'config.settings.prod' || github.ref_name == 'stage' && 'config.settings.stage' || 'config.settings.develop' }}",
              "ALLOWED_HOSTS": "${{ github.ref_name == 'main' && vars.DJANGO_ALLOWED_HOSTS_PROD || github.ref_name == 'stage' && vars.DJANGO_ALLOWED_HOSTS_STAGE || vars.DJANGO_ALLOWED_HOSTS_DEVELOP }}",
              "DB_ENGINE_TYPE": "pg",
              "DB_ENGINE": "django.db.backends.postgresql_psycopg2",
              "DB_NAME": "test_db",
              "DB_USER": "postgres",
              "DB_PASSWORD": "${{ secrets.DB_PASSWORD }}",
              "DB_HOST": "/cloudsql/involuted-bird-416608:us-central1:platform-develop",
              "DB_PORT": "",
              "CORS_ALLOW_ALL_ORIGINS": "False",
              "CORS_ALLOWED_ORIGINS": "${{ github.ref_name == 'main' && vars.CORS_ALLOWED_ORIGINS_PROD || github.ref_name == 'stage' && vars.CORS_ALLOWED_ORIGINS_STAGE || vars.CORS_ALLOWED_ORIGINS_DEVELOP }}",
              "CORS_ALLOW_CREDENTIALS": "False",
              "JWT_ALGORITHM": "${{ vars.JWT_ALGORITHM || 'HS256' }}",
              "JWT_ACCESS_TOKEN_LIFETIME_MINUTES": "${{ vars.JWT_ACCESS_TOKEN_LIFETIME_MINUTES || '30' }}",
              "JWT_REFRESH_TOKEN_LIFETIME_DAYS": "${{ vars.JWT_REFRESH_TOKEN_LIFETIME_DAYS || '14' }}",
              "JWT_ROTATE_REFRESH_TOKENS": "${{ vars.JWT_ROTATE_REFRESH_TOKENS || 'True' }}",
              "JWT_BLACKLIST_AFTER_ROTATION": "${{ vars.JWT_BLACKLIST_AFTER_ROTATION || 'True' }}",
              "JWT_SIGNING_KEY": "${{ secrets.JWT_SIGNING_KEY }}",
              "SECRET_KEY": "${{ secrets.SECRET_KEY }}"
            }
        run: |
          set -e
          BASE_JSON='{"ENVIRONMENT":"${{ needs.setup.outputs.environment }}","CLOUDSQL_INSTANCE":"involuted-bird-416608:us-central1:platform-develop"}'
          MERGED_JSON=$(jq -s '.[0] * .[1]' <(echo "$BASE_JSON") <(echo "$INPUT_ENV_VARS_JSON"))
          ENV_FILE="$(mktemp)"
          echo "$MERGED_JSON" > "$ENV_FILE"
          echo "env_vars_file=$ENV_FILE" >> $GITHUB_OUTPUT

      - name: Create or update Cloud Run Job for migrations
        run: |
          JOB_NAME="job-expense-tracker-migrate-${{ needs.setup.outputs.environment }}"
          if gcloud run jobs describe $JOB_NAME --region ${{ vars.REGION }} --project ${{ vars.GCP_PROJECT_ID }} &>/dev/null; then
            gcloud run jobs update $JOB_NAME \
              --image ${{ needs.setup.outputs.image_tag }} \
              --region ${{ vars.REGION }} \
              --project ${{ vars.GCP_PROJECT_ID }} \
              --service-account ${{ vars.RUNTIME_SA }} \
              --env-vars-file "${{ steps.prep-migrate-env.outputs.env_vars_file }}" \
              --set-cloudsql-instances="involuted-bird-416608:us-central1:platform-develop" \
              --task-timeout 600 \
              --quiet
          else
            gcloud run jobs create $JOB_NAME \
              --image ${{ needs.setup.outputs.image_tag }} \
              --region ${{ vars.REGION }} \
              --project ${{ vars.GCP_PROJECT_ID }} \
              --service-account ${{ vars.RUNTIME_SA }} \
              --env-vars-file "${{ steps.prep-migrate-env.outputs.env_vars_file }}" \
              --set-cloudsql-instances="involuted-bird-416608:us-central1:platform-develop" \
              --task-timeout 600 \
              --command "python" \
              --args "manage.py,migrate,--noinput" \
              --quiet
          fi

      - name: Execute migration job
        run: |
          JOB_NAME="job-expense-tracker-migrate-${{ needs.setup.outputs.environment }}"
          gcloud run jobs execute $JOB_NAME \
            --region ${{ vars.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --wait
